# Mode dev : MariaDB + kesh-api (mode test intégration)
# Pour le développement quotidien avec hot reload : cargo run + MariaDB seule
# Pour la production : voir docker-compose.yml (Story 8.1)

services:
  kesh:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kesh-dev
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      DATABASE_URL: mysql://kesh:kesh_dev@mariadb:3306/kesh
      KESH_PORT: "3000"
      # Story 6.4 : le défaut applicatif est désormais 127.0.0.1. En Docker,
      # on bind 0.0.0.0 pour que le port mapping `127.0.0.1:3000:3000`
      # de la section `ports:` fonctionne (sinon le container écouterait
      # uniquement sur sa propre loopback, inaccessible depuis l'hôte).
      # Ne JAMAIS set KESH_TEST_MODE=true avec KESH_HOST=0.0.0.0
      # (ConfigError::TestModeWithPublicBind refusera le démarrage).
      KESH_HOST: "0.0.0.0"
      KESH_ADMIN_USERNAME: ${KESH_ADMIN_USERNAME:-admin}
      KESH_ADMIN_PASSWORD: ${KESH_ADMIN_PASSWORD:-admin}
      KESH_JWT_SECRET: ${KESH_JWT_SECRET:-dev-secret-at-least-32-bytes-long-for-testing}
      RUST_LOG: ${RUST_LOG:-info}
    depends_on:
      mariadb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  mariadb:
    image: mariadb:11.4
    container_name: kesh-mariadb-dev
    restart: unless-stopped
    ports:
      - "127.0.0.1:3306:3306"
    environment:
      MARIADB_ROOT_PASSWORD: kesh_dev_root
      MARIADB_DATABASE: kesh
      MARIADB_USER: kesh
      MARIADB_PASSWORD: kesh_dev
    volumes:
      - kesh-mariadb-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  kesh-mariadb-data:
