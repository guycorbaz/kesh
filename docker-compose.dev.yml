# Mode dev : MariaDB + kesh-api (mode test intégration)
# Pour le développement quotidien avec hot reload : cargo run + MariaDB seule
# Pour la production : voir docker-compose.yml (Story 8.1)

services:
  kesh:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kesh-dev
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      DATABASE_URL: mysql://kesh:kesh_dev@mariadb:3306/kesh
      KESH_PORT: "3000"
      KESH_HOST: "0.0.0.0"
      KESH_ADMIN_USERNAME: ${KESH_ADMIN_USERNAME:-admin}
      KESH_ADMIN_PASSWORD: ${KESH_ADMIN_PASSWORD:-changeme}
      RUST_LOG: ${RUST_LOG:-info}
    depends_on:
      mariadb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  mariadb:
    image: mariadb:11.4
    container_name: kesh-mariadb-dev
    restart: unless-stopped
    ports:
      - "127.0.0.1:3306:3306"
    environment:
      MARIADB_ROOT_PASSWORD: kesh_dev_root
      MARIADB_DATABASE: kesh
      MARIADB_USER: kesh
      MARIADB_PASSWORD: kesh_dev
    volumes:
      - kesh-mariadb-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  kesh-mariadb-data:
