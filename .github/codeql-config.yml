name: CodeQL config — suppress test false positives

# Exclude test directories entirely
paths-ignore:
  - crates/kesh-api/tests
  - crates/kesh-db/tests
  - frontend

# Disable specific rules that produce false positives in test files
disable-default-queries: false

# Custom query configuration
queries:
  - uses: security-extended
  - uses: security-and-quality

