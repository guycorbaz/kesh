name: Feature Request
description: Suggest a new feature or enhancement
title: "[feature] "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement to Kesh.

        For larger scope changes, consider opening a discussion first or adding a `CR-NNN` entry in [`docs/change_request.md`](../../docs/change_request.md).

  - type: textarea
    id: problem
    attributes:
      label: Problem / use case
      description: What problem does this feature solve? Who benefits?
    validations:
      required: true

  - type: textarea
    id: proposed_solution
    attributes:
      label: Proposed solution
      description: Describe the desired behavior. Include UI mockups or API examples if relevant.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false

  - type: dropdown
    id: scope
    attributes:
      label: Scope
      options:
        - Small (< 1 day)
        - Medium (1-3 days)
        - Large (> 3 days, likely needs a PRD/spec)
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      multiple: true
      options:
        - Backend (Rust / Axum)
        - Frontend (Svelte)
        - Database / migrations (MariaDB)
        - QR Bill / PDF generation (kesh-qrbill)
        - i18n (Fluent FTL)
        - CI / build / docker
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance criteria
      description: How will we know this is done? List testable conditions.
      placeholder: |
        - [ ] Given X, when Y, then Z
        - [ ] All 4 locales translated
        - [ ] E2E test added
    validations:
      required: false

  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues and this is not a duplicate
          required: true
