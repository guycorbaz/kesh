name: Bug Report
description: Report a defect in Kesh
title: "[bug] "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the sections below so we can reproduce and fix it.

        **Do not report security vulnerabilities here** — see [SECURITY.md](../../SECURITY.md).

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One-sentence description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal, deterministic steps. Include sample inputs if relevant.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. Observe '...'
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include error messages, stack traces, or screenshots.
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      multiple: true
      options:
        - Backend (Rust / Axum)
        - Frontend (Svelte)
        - Database / migrations (MariaDB)
        - QR Bill / PDF generation (kesh-qrbill)
        - i18n (Fluent FTL)
        - CI / build / docker
        - Documentation
        - Other
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version / commit SHA
      description: Output of `git rev-parse --short HEAD` or release tag.
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, browser (if frontend), MariaDB version, Rust version, etc.
      placeholder: |
        - OS: Ubuntu 24.04
        - Browser: Firefox 134
        - MariaDB: 10.11.6
        - rustc: 1.84.0
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / output
      render: shell
    validations:
      required: false

  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues and this is not a duplicate
          required: true
        - label: I can reproduce this on the latest `main` branch
          required: false
