name: CodeQL

on:
  push:
    branches: [main, story/**]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        language: ['cpp', 'csharp', 'go', 'java', 'javascript', 'python', 'ruby', 'rust']

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: ${{ matrix.language }}

    # Build using the standard Rust toolchain for better control
    - name: Build (Rust)
      if: matrix.language == 'rust'
      run: |
        cargo build --release 2>&1 || true
        # Don't fail on build errors; CodeQL will analyze what it can

    - name: Autobuild (non-Rust)
      if: matrix.language != 'rust'
      uses: github/codeql-action/autobuild@v3

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3
      with:
        category: "/language:${{ matrix.language }}"
        # Exclude test files from CodeQL analysis
        paths-ignore: |
          crates/*/tests
          frontend/
