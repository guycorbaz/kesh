name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  backend:
    name: Backend (Rust)
    runs-on: ubuntu-latest
    services:
      mariadb:
        image: mariadb:11.4
        env:
          MARIADB_ROOT_PASSWORD: kesh_root
          MARIADB_DATABASE: kesh
          MARIADB_USER: kesh
          MARIADB_PASSWORD: kesh_dev
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    env:
      DATABASE_URL: mysql://root:kesh_root@127.0.0.1:3306/kesh
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (from rust-toolchain.toml)
        run: rustup show

      - name: Add rustfmt and clippy
        run: rustup component add rustfmt clippy

      - uses: Swatinem/rust-cache@v2

      - name: Wait for MariaDB
        run: |
          for i in {1..30}; do
            if mysqladmin ping -h 127.0.0.1 -P 3306 -uroot -pkesh_root --silent; then
              echo "MariaDB ready"; exit 0
            fi
            sleep 2
          done
          echo "MariaDB not ready"; exit 1

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo test
        # -j1 to avoid cross-binary flakiness (see feedback_sqlx_mysql_gotchas)
        run: cargo test --workspace -j1

  frontend:
    name: Frontend (Svelte)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - name: svelte-check
        run: npm run check

      - name: unit tests
        run: npm run test:unit

      - name: build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/build
          retention-days: 1

  e2e:
    name: E2E (Playwright)
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    services:
      mariadb:
        image: mariadb:11.4
        env:
          MARIADB_ROOT_PASSWORD: kesh_root
          MARIADB_DATABASE: kesh
          MARIADB_USER: kesh
          MARIADB_PASSWORD: kesh_dev
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    env:
      DATABASE_URL: mysql://root:kesh_root@127.0.0.1:3306/kesh
      KESH_PORT: "3000"
      KESH_HOST: "127.0.0.1"
      KESH_ADMIN_USERNAME: admin
      KESH_ADMIN_PASSWORD: admin
      KESH_JWT_SECRET: ci-secret-at-least-32-bytes-long-for-testing
      RUST_LOG: info
    steps:
      - uses: actions/checkout@v4

      - run: rustup show
      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Build backend
        run: cargo build --release -p kesh-api

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Start backend
        env:
          KESH_STATIC_DIR: ${{ github.workspace }}/frontend/build
          KESH_LOCALES_DIR: ${{ github.workspace }}/crates/kesh-i18n/locales
        run: |
          ./target/release/kesh-api > backend.log 2>&1 &
          echo $! > backend.pid
          for i in {1..30}; do
            if curl -sf http://127.0.0.1:3000/health; then
              echo "Backend ready"; exit 0
            fi
            sleep 2
          done
          echo "Backend failed to start"; cat backend.log; exit 1

      - name: Run Playwright
        working-directory: frontend
        run: npm run test:e2e

      - name: Stop backend
        if: always()
        run: kill $(cat backend.pid) || true

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report
          retention-days: 7

  docker-build:
    name: Docker build (sanity)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: false
          tags: kesh:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
